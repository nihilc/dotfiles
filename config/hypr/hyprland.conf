### MONITORS
# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto


### AUTO START
exec-once = hyprpaper
exec-once = hyprsunset
# exec-once = hypridle
exec-once = vicinae server
exec-once = qs -c noctalia-shell


### ENVIRONMENT VARIABLES
# See https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum


### LOOK AND FEEL
source = ~/.config/hypr/config.conf

# https://wiki.hypr.land/Configuring/Variables/#general
general {
  layout = master
  gaps_in = $gaps_in
  gaps_out = $gaps_out
  float_gaps = $gaps_out
  border_size = $border
  col.active_border = $color_accent
  col.inactive_border = $color_inactive
  resize_on_border = false
  allow_tearing = false
  snap {
    enabled = true
    respect_gaps = true
  }
}

# See https://wiki.hypr.land/Configuring/Variables/#group
group {
  auto_group = true
  insert_after_current = true
  col.border_active = $color_accent_alt
  col.border_inactive = $color_inactive
  groupbar {
    render_titles = false
    col.active = $color_accent_alt
    col.inactive = $color_inactive
    rounding = $rounding
    round_only_edges = false
    gaps_in = $groupbar_gaps_in
    gaps_out = $groupbar_gaps_out
    indicator_gap = -$groupbar_gaps_out
    indicator_height = $groupbar_height
  }
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
  mfact = 0.5
  new_status = slave
  orientation = left
}

# See https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
  rounding = $rounding
  active_opacity = $active_opacity
  inactive_opacity = $inactive_opacity
  # https://wiki.hypr.land/Configuring/Variables/#blur
  blur {
    enabled = false
  }
  # See https://wiki.hypr.land/Configuring/Variables/#shadow
  shadow {
    enabled = false
  }
}

# See https://wiki.hypr.land/Configuring/Variables/#animations
animations {
  enabled = yes

  # See https://wiki.hypr.land/Configuring/Animations/#curves
  bezier = linear,        0.00,  0.00,  1.00,  1.00
  bezier = easeIn,        0.50,  0.00,  0.75,  0.00 # easeInQuart
  bezier = easeOut,       0.25,  1.00,  0.50,  1.00 # easeOutQuart
	bezier = easeInOut,     0.76,  0.00,  0.24,  1.00 # easeInOutQuart

  # Default animations, see https://wiki.hypr.land/Configuring/Animations/
  animation = global,              1, 3, default
  animation = windows,             1, 3, easeOut,   slide
  animation = windowsIn,           1, 3, easeOut,   slide
  animation = windowsOut,          1, 3, easeIn,    slide
  animation = workspaces,          1, 3, easeInOut, slide
  animation = specialWorkspaceIn,  1, 3, easeOut,   slide top
  animation = specialWorkspaceOut, 1, 3, easeIn,    slide bottom
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = false
  key_press_enables_dpms = true
  enable_swallow = false
  swallow_regex = ^(kitty|.*ghostty)$
  focus_on_activate = true
}


### INPUT
# https://wiki.hypr.land/Configuring/Variables/#input
input {
  kb_layout = us
  kb_variant = altgr-intl
  kb_options = caps:escape
  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
  follow_mouse = 1
}


### MY PROGRAMS
# See https://wiki.hypr.land/Configuring/Keywords/
$ipc            = qs -c noctalia-shell ipc call
$menu           = vicinae toggle
$terminal       = ghostty
$fileManagerGui = nautilus
$fileManagerTui = $terminal -e yazi

$pickColor      = hyprpicker -a
$pickClipboard  = vicinae vicinae://extensions/vicinae/clipboard/history

$screenshot     = hyprshot -o ~/Pictures/Screenshots -f screenshot-$(date +"%F-%H%M%S").png

# Core binds
bind = SUPER, S, exec, $ipc controlCenter toggle

### KEYBINDINGS
# See https://wiki.hypr.land/Configuring/Binds/
$mainMod = SUPER

## System/Shell
bind = $mainMod ALT, q, exec, $ipc sessionMenu toggle
bind = $mainMod ALT, b, exec, $ipc bar toggle
bind = $mainMod ALT, n, exec, $ipc notifications toggleHistory
bind = $mainMod ALT, m, exec, $ipc media toggle

## Programs

# general
bind = $mainMod, Space, exec, $menu
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, e, exec, $fileManagerGui
bind = $mainMod, f, exec, $fileManagerTui
# utilities
bind = $mainMod, c, exec, $pickColor
bind = $mainMod, v, exec, $pickClipboard
# screenshots
bind = ,      Print, exec, $screenshot -m region
bind = Ctrl,  Print, exec, $screenshot -m window
bind = Shift, Print, exec, $screenshot -m output -m active

#: Windows

# Close window
bind = $mainMod, q, killactive,
# Change State
bind = $mainMod, u, fullscreen
bind = $mainMod, i, fullscreen, 1
bind = $mainMod, o, togglefloating
bind = $mainMod, y, toggleswallow
# Move focus to next/prev
bind = $mainMod, j, layoutmsg, cyclenext
bind = $mainMod, k, layoutmsg, cycleprev
# Swap windows to next/prev
bind = $mainMod Shift, j, layoutmsg, swapnext
bind = $mainMod Shift, k, layoutmsg, swapprev
# Swap window with master
bind = $mainMod, m, layoutmsg, swapwithmaster
# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#: Groups

bind = $mainMod, semicolon, togglegroup
bind = $mainMod Ctrl, semicolon, moveoutofgroup
bind = $mainMod Ctrl, j, moveintogroup, d
bind = $mainMod Ctrl, k, moveintogroup, u
bind = $mainMod Ctrl, h, moveintogroup, l
bind = $mainMod Ctrl, l, moveintogroup, r
bind = $mainMod, TAB, changegroupactive, f
bind = $mainMod SHIFT, TAB, changegroupactive, b

#: Workspaces

# Scroll through occupied workspaces
bind = $mainMod, h, workspace, e-1
bind = $mainMod, l, workspace, e+1
# Move windows to next/prev occupied workspace
bind = $mainMod Shift, h, movetoworkspace, e-1
bind = $mainMod Shift, l, movetoworkspace, e+1
# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, mouse_down, workspace, e+1
# Example special workspace (scratchpad)
bind = $mainMod, Z, togglespecialworkspace, magic1
bind = $mainMod SHIFT, Z, movetoworkspace, special:magic1
bind = $mainMod, X, togglespecialworkspace, magic2
bind = $mainMod SHIFT, X, movetoworkspace, special:magic2
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

#: Laptop brightness and multimedia keys

bindle = ,XF86AudioRaiseVolume,  exec, $ipc volume increase
bindle = ,XF86AudioLowerVolume,  exec, $ipc volume decrease
bindle = ,XF86AudioMute,         exec, $ipc volume muteOutput
bindle = ,XF86AudioMicMute,      exec, $ipc volume muteInput
bindle = ,XF86MonBrightnessUp,   exec, $ipc brightness increase
bindle = ,XF86MonBrightnessDown, exec, $ipc brightness decrease
bindl  = ,XF86AudioNext,         exec, playerctl next
bindl  = ,XF86AudioPrev,         exec, playerctl previous
bindl  = ,XF86AudioPlay,         exec, playerctl play-pause
bindl  = ,XF86AudioPause,        exec, playerctl play-pause


### Windows/Workspaces Rules
# See https://wiki.hypr.land/Configuring/Window-Rules/
# See https://wiki.hypr.land/Configuring/Workspace-Rules/

windowrule {
  name = suppress-maximize-events
  match:class = .*

  suppress_event = maximize
}

windowrule {
  # Fix some dragging issues with XWayland
  name = fix-xwayland-drags
  match:class = ^$
  match:title = ^$
  match:xwayland = true
  match:float = true
  match:fullscreen = false
  match:pin = false

  no_focus = true
}

#: floating rules
windowrule {
  name = center-all-floating-windows
  match:float = true

  center = true
}

windowrule {
  name = PiP-float-and-pin
  match:title = Picture-in-Picture

  pin = true
  float = true
  # TODO: make it work for general resolutions
  size = 426 240
  move = 1486 8
}

windowrule {
  name = hyprland-share-picker-floating
  match:class = hyprland-share-picker

  float = true
  size = 400 600
}

#: workspaces rules
windowrule = match:class com.github.th_ch.youtube_music, workspace special:magic1
windowrule = match:class com.obsproject.Studio, workspace special:magic2
windowrule = match:class steam, workspace 3
windowrule = match:class vesktop, workspace 4
