# Alacritty config
window:
  dimensions:
    columns: 140
    lines: 36
  padding:
    x: 0
    y: 0
  dynamic_padding: true
  opacity: 1

mouse:
  hide_when_typing: true

cursor:
  style:
    shape: Block
    blinking: on

font:
  normal:
    family: 'JetBrains Mono Nerd Font'
    style: Regular
  bold:
    family: 'JetBrains Mono Nerd Font'
    style: Bold
  italic:
    family: 'JetBrains Mono Nerd Font'
    style: Italic
  bold_italic:
    family: 'JetBrains Mono Nerd Font'
    style: Bold Italic
  size: 9

colors:
  # tokyonight base46 nvchad
  primary:
    background: '#1a1b26'
    foreground: '#c0caf5'
  normal:
    black:    '#414868'
    red:      '#f7768e'
    green:    '#9ece6a'
    yellow:   '#e0af68'
    blue:     '#7aa2f7'
    magenta:  '#bb9af7'
    cyan:     '#7dcfff'
    white:    '#c0caf5'
  bright:
    black:    '#414868'
    red:      '#f7768e'
    green:    '#9ece6a'
    yellow:   '#e0af68'
    blue:     '#7aa2f7'
    magenta:  '#bb9af7'
    cyan:     '#7dcfff'
    white:    '#c0caf5'
