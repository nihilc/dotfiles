[colors]
bg      = #1a1b26
fg      = #c0caf5
ng      = #00000000

black   = #414868
red     = #f7768e
green   = #9ece6a
yellow  = #e0af68
blue    = #7aa2f7
magenta = #bb9af7
cyan    = #7dcfff
white   = #c0caf5
gray    = #40486a

[bar/example]
width = 1354px
height = 18
radius = 0

offset-x = 5px
offset-y = 5px
; dpi = 96

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 3

border-bottom-size = 3
border-top-size = 3
border-color = ${colors.bg}

padding-left = 3px
padding-right = 3px

module-margin = 0

font-0 = Ubuntu Nerd Font:pixelsize=10;2
font-1 = JetBrains Mono Nerd Font:pixelsize=13;3
font-2 = JetBrains Mono Nerd Font:pixelsize=18;4
font-3 = Togalite bold:pixelsize=10;2

modules-left = archico sepl-magenta sepl-bg-blue bspwm sepl-blue 
modules-center = sepr-magenta xwindow sepl-magenta 
modules-right = sepr-blue pulseaudio sepr-bg-blue sepr-magenta memory sepr-bg-magenta sepr-blue cpu sepr-bg-blue sepr-magenta date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-detached = true
tray-position = left
tray-offset-x = 290

wm-restack = bspwm

; Modules
[module/archico]
type = custom/text
content = ÔĆÉ
content-font = 2
content-background = ${colors.magenta}
content-foreground = ${colors.bg}
content-padding = 1

click-left = rofi -show drun
click-right = rofi -show window

[module/xwindow]
type = internal/xwindow
format = <label>
format-background = ${colors.magenta}
format-foreground = ${colors.bg}
format-padding = 2
label = %title%
label-empty = i use arch btw
label-maxlen = 50

[module/bspwm]
type = internal/bspwm

format = <label-state>

ws-icon-0 = 1;šłÄ
ws-icon-1 = 2;šļĆ
ws-icon-2 = 3;šłČ
ws-icon-3 = 4;Śõõ
ws-icon-4 = 5;šļĒ
ws-icon-5 = 6;ŚÖ≠
ws-icon-6 = 7;šłÉ
ws-icon-7 = 8;ŚÖę
ws-icon-8 = 9;šĻĚ

label-focused = %icon%
label-focused-background = ${colors.blue}
label-focused-foreground = ${colors.bg}
label-focused-underline = ${colors.bg}
label-focused-padding = 5px

label-occupied = %icon%
label-occupied-background = ${colors.blue}
label-occupied-foreground = ${colors.bg}
label-occupied-padding = 5px

label-empty = %icon% 
label-empty-background = ${colors.blue}
label-empty-foreground = ${colors.white}
label-empty-padding = 5px

label-urgent = %icon%
label-urgent-background = ${colors.blue}
label-urgent-foreground = ${colors.bg}
label-urgent-underline = ${colors.red}
label-urgent-padding = 5px

[module/pulseaudio]
type = internal/pulseaudio

label-volume = %percentage%%
format-volume = <label-volume>
format-volume-prefix = "Ô©Ĺ "
format-volume-prefix-font = 2
format-volume-background = ${colors.blue}
format-volume-foreground = ${colors.bg}
format-volume-padding = 1

label-muted = %percentage%%
format-muted = <label-muted>
format-muted-prefix = "Ô™Ä "
format-muted-prefix-font = 2
format-muted-background = ${colors.blue} 	
format-muted-foreground = ${colors.fg}
format-muted-padding = 1

click-right = pavucontrol

[module/memory]
type = internal/memory
interval = 1

label = %gb_used%
format = <label>
format-padding = 1
format-foreground = ${colors.bg}
format-background = ${colors.magenta}
format-prefix = "Ô°ö "
format-prefix-font = 2

[module/cpu]
type = internal/cpu
interval = 1

label = %percentage%%
format = <label>
format-padding = 1
format-foreground = ${colors.bg}
format-background = ${colors.blue}
format-prefix = "ÓČą "
format-prefix-font = 2

[module/date]
type = internal/date
interval = 1

label = %date%
format = <label>
format-padding = 1
format-background = ${colors.magenta}
format-foreground = ${colors.bg}
format-prefix = "ÔôŹ "
format-prefix-font = 2

date = %H:%M
date-alt = %Y-%m-%d %H:%M

; Separators single color
[module/sepl-magenta]
type = custom/text
content = "Óāį"
content-font = 3
content-foreground = ${colors.magenta}
[module/sepr-magenta]
type = custom/text
content = "Óā≤"
content-font = 3
content-foreground = ${colors.magenta}
[module/sepl-blue]
type = custom/text
content = "Óāį"
content-font = 3
content-foreground = ${colors.blue}
[module/sepr-blue]
type = custom/text
content = "Óā≤"
content-font = 3
content-foreground = ${colors.blue}
[module/sepl-white]
type = custom/text
content = "Óāį"
content-font = 3
content-foreground = ${colors.white}
[module/sepr-white]
type = custom/text
content = "Óā≤"
content-font = 3
content-foreground = ${colors.white}
; Separators multi color
[module/sepl-bg-magenta]
type = custom/text
content = "Óāį"
content-font=3
content-foreground = ${colors.bg}
content-background = ${colors.magenta}
[module/sepr-bg-magenta]
type = custom/text
content = "Óā≤"
content-font=3
content-foreground = ${colors.bg}
content-background = ${colors.magenta}
[module/sepl-bg-blue]
type = custom/text
content = "Óāį"
content-font=3
content-foreground = ${colors.bg}
content-background = ${colors.blue}
[module/sepr-bg-blue]
type = custom/text
content = "Óā≤"
content-font=3
content-foreground = ${colors.bg}
content-background = ${colors.blue}

[settings]
screenchange-reload = true
pseudo-transparency = true
