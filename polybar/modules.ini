[module/archico]
type = custom/text
content = 
content-font = 2
content-background = ${colors.red}
content-foreground = ${colors.bg}
content-padding = 1

click-left = rofi -show drun
click-right = rofi -show window

[module/xwindow]
type = internal/xwindow
format = <label>
format-background = ${colors.magenta}
format-foreground = ${colors.bg}
format-padding = 2
label = %title%
label-empty = i use arch btw
label-maxlen = 50

[module/bspwm]
type = internal/bspwm

format = <label-state>

ws-icon-0 = 1;一
ws-icon-1 = 2;二
ws-icon-2 = 3;三
ws-icon-3 = 4;四
ws-icon-4 = 5;五
ws-icon-5 = 6;六
ws-icon-6 = 7;七
ws-icon-7 = 8;八
ws-icon-8 = 9;九

label-focused = %icon%
label-focused-background = ${colors.blue}
label-focused-foreground = ${colors.bg}
label-focused-underline = ${colors.bg}
label-focused-padding = 5px

label-occupied = %icon%
label-occupied-background = ${colors.blue}
label-occupied-foreground = ${colors.bg}
label-occupied-padding = 5px

label-empty = %icon% 
label-empty-background = ${colors.blue}
label-empty-foreground = ${colors.white}
label-empty-padding = 5px

label-urgent = %icon%
label-urgent-background = ${colors.blue}
label-urgent-foreground = ${colors.bg}
label-urgent-underline = ${colors.red}
label-urgent-padding = 5px

[module/pulseaudio]
type = internal/pulseaudio

label-volume = %percentage%%
format-volume = <label-volume>
format-volume-prefix = "墳 "
format-volume-prefix-font = 2
format-volume-background = ${colors.cyan}
format-volume-foreground = ${colors.bg}
format-volume-padding = 1

label-muted = %percentage%%
format-muted = <label-muted>
format-muted-prefix = "婢 "
format-muted-prefix-font = 2
format-muted-background = ${colors.cyan} 	
format-muted-foreground = ${colors.fg}
format-muted-padding = 1

click-right = pavucontrol

[module/memory]
type = internal/memory
interval = 1

label = %gb_used%
format = <label>
format-padding = 1
format-foreground = ${colors.bg}
format-background = ${colors.green}
format-prefix = " "
format-prefix-font = 2

[module/cpu]
type = internal/cpu
interval = 1

label = %percentage%%
format = <label>
format-padding = 1
format-foreground = ${colors.bg}
format-background = ${colors.yellow}
format-prefix = " "
format-prefix-font = 2

[module/date]
type = internal/date
interval = 1

label = %date%
format = <label>
format-padding = 1
format-background = ${colors.white}
format-foreground = ${colors.bg}
format-prefix = " "
format-prefix-font = 2

date = %H:%M
date-alt = %Y-%m-%d %H:%M
